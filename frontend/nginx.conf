server {
    listen 80;
    server_name react.kct.ac.in localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Send browsers to HTTPS for the public host (skip for localhost; honour proxy TLS / native SSL)
    set $react_redirect_https 0;
    if ($host = react.kct.ac.in) {
        set $react_redirect_https 1;
    }
    if ($http_x_forwarded_proto = https) {
        set $react_redirect_https 0;
    }
    if ($scheme = https) {
        set $react_redirect_https 0;
    }
    if ($react_redirect_https = 1) {
        return 301 https://$host$request_uri;
    }

    # Profile picture uploads (default nginx limit is 1m)
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API (Express)
    location /api {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 120s;
    }

    # Uploaded profile images
    location /uploads {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # SPA: React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
